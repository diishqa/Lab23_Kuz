<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль пользователя</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="prof-container">
        <h2>Введите данные</h2>
        <form id="profileForm">
            <div class="form">
                <label for="name">Имя:</label>
                <input type="text" id="name" placeholder="Введите тия"
            </div>
            <div class="form">
                <label for="age">Возраст:</label>
                <input type="text" id="age" placeholder="Введите возраст"
            </div>
            <div class="form">
                <label for="city">Город:</label>
                <input type="text" id="city" placeholder="Введите Город"
            </div>
            <div class="form">
                <label for="hobby">Хобби:</label>
                <input type="text" id="hobby" placeholder="Введите хобби"
            </div>
            <button type="button" class="clear-btn" id="clearBtn">Очистить данные</button>
        </form>
    </div>
    <script src="main.js"></script>
</body>
</html>
